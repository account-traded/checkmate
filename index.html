<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Trade Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --page:      #070A10;
  --card:      #0C1018;
  --raised:    #111827;
  --border:    #1B2438;
  --txt:       #E2E8F0;
  --muted:     #64748B;
  --dim:       #2D3748;
  --green:     #00D97E;
  --green-lo:  rgba(0,217,126,.08);
  --green-mid: rgba(0,217,126,.18);
  --red:       #FF4560;
  --red-lo:    rgba(255,69,96,.08);
  --red-mid:   rgba(255,69,96,.18);
  --blue:      #3B82F6;
  --r:         10px;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Inter', sans-serif;
}
*  { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-tap-highlight-color: transparent; }
body {
  background: var(--page);
  color: var(--txt);
  font-family: var(--sans);
  font-size: 14px;
  min-height: 100vh;
  padding:
    max(env(safe-area-inset-top,  0px), 20px)
    max(env(safe-area-inset-right, 0px), 16px)
    max(env(safe-area-inset-bottom,0px), 60px)
    max(env(safe-area-inset-left,  0px), 16px);
}
.wrap { max-width: 900px; margin: 0 auto; }

/* ─── HEADER ──────────────────────────────────────────────────────────── */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
  gap: 10px;
}
.header-left { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green); box-shadow: 0 0 7px var(--green);
  animation: blink 2.4s ease-in-out infinite; flex-shrink: 0;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.header h1 { font-family: var(--mono); font-size: 16px; font-weight: 700; color: #fff; }
.hdr-date {
  font-family: var(--mono); font-size: 11px; color: var(--muted);
  background: var(--raised); border: 1px solid var(--border);
  padding: 4px 9px; border-radius: 6px; white-space: nowrap;
}

/* ─── BALANCE CARD ────────────────────────────────────────────────────── */
.balance-card {
  position: relative;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px 22px 16px;
  margin-bottom: 12px;
  overflow: hidden;
  transition: border-color .4s, box-shadow .4s;
}
.balance-card::before {
  content: ''; position: absolute; inset: 0; border-radius: 14px;
  pointer-events: none; transition: opacity .4s;
}
.balance-card::after {
  content: ''; position: absolute;
  left: 0; top: 16%; bottom: 16%;
  width: 3px; border-radius: 0 3px 3px 0;
  background: var(--border); transition: background .4s, box-shadow .4s;
}
.balance-card.g {
  border-color: rgba(0,217,126,.3);
  box-shadow: 0 0 40px rgba(0,217,126,.05), inset 0 1px 0 rgba(0,217,126,.08);
}
.balance-card.g::before { background: radial-gradient(ellipse at 10% 50%, rgba(0,217,126,.05), transparent 55%); }
.balance-card.g::after  { background: var(--green); box-shadow: 0 0 10px var(--green); }
.balance-card.r {
  border-color: rgba(255,69,96,.3);
  box-shadow: 0 0 40px rgba(255,69,96,.05), inset 0 1px 0 rgba(255,69,96,.08);
}
.balance-card.r::before { background: radial-gradient(ellipse at 10% 50%, rgba(255,69,96,.05), transparent 55%); }
.balance-card.r::after  { background: var(--red); box-shadow: 0 0 10px var(--red); }

.b-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }
.b-lbl {
  font-size: 10px; font-weight: 600; letter-spacing: .1em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
}
.b-val {
  font-family: var(--mono); font-size: 22px; font-weight: 700;
  color: #fff; line-height: 1; margin-bottom: 4px;
  display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap;
}
.b-val.g { color: var(--green); text-shadow: 0 0 20px rgba(0,217,126,.25); }
.b-val.r { color: var(--red);   text-shadow: 0 0 20px rgba(255,69,96,.25); }
.b-hint { font-size: 11px; color: var(--muted); font-family: var(--mono); }

.badge {
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  padding: 3px 7px; border-radius: 5px;
}
.badge.g { background: var(--green-mid); color: var(--green); }
.badge.r { background: var(--red-mid);   color: var(--red); }
.badge.n { background: var(--raised); color: var(--muted); border: 1px solid var(--border); }

.edit-btn {
  background: none; border: 1px solid var(--border); border-radius: 4px;
  color: var(--dim); cursor: pointer; font-size: 9px; font-weight: 600;
  letter-spacing: .06em; text-transform: uppercase; padding: 2px 6px;
  transition: all .15s;
}
.edit-btn:hover { border-color: var(--blue); color: var(--blue); }
.cap-edit { display: none; align-items: center; gap: 8px; margin-top: 8px; }
.cap-edit.open { display: flex; }
.cap-edit input {
  background: var(--page); border: 1px solid var(--blue); border-radius: 6px;
  color: #fff; font-family: var(--mono); font-size: 16px;
  padding: 6px 10px; outline: none; width: 120px;
}
.cap-edit button {
  background: var(--blue); border: none; border-radius: 6px;
  color: #fff; cursor: pointer; font-size: 12px; font-weight: 600; padding: 7px 14px;
}
.pbar-wrap { height: 3px; background: var(--border); border-radius: 2px; margin-top: 18px; overflow: hidden; }
.pbar-fill {
  height: 100%; border-radius: 2px;
  transition: width .5s ease, background .4s; width: 0%;
}
.pbar-fill.g { background: var(--green); box-shadow: 0 0 6px rgba(0,217,126,.4); }
.pbar-fill.r { background: var(--red);   box-shadow: 0 0 6px rgba(255,69,96,.4); }

/* ─── STATS ───────────────────────────────────────────────────────────── */
.stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 18px; }
.stat { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 11px 13px; }
.s-lbl { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.s-val { font-family: var(--mono); font-size: 15px; font-weight: 700; color: #fff; }
.s-val.g { color: var(--green); }
.s-val.r { color: var(--red); }

/* ─── FORM ────────────────────────────────────────────────────────────── */
.form-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px 18px; margin-bottom: 22px;
}
.form-title { font-size: 11px; font-weight: 600; letter-spacing: .09em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
.form-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
.fg { display: flex; flex-direction: column; gap: 4px; }
.fg label { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
.fg input, .fg textarea {
  background: var(--page); border: 1px solid var(--border); border-radius: 7px;
  color: #fff; font-family: var(--mono); font-size: 13px;
  padding: 8px 10px; outline: none; width: 100%;
  transition: border .15s, box-shadow .15s;
}
.fg input:focus, .fg textarea:focus {
  border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,.1);
}
.fg input::placeholder, .fg textarea::placeholder { color: var(--dim); }
.fg textarea { resize: none; height: 38px; line-height: 1.5; }
.f-date  { flex: 1 1 130px; }
.f-tick  { flex: 1 1 100px; }
.f-num   { flex: 1 1 88px; }
.f-note  { flex: 1 1 100%; }

/* Quick tags */
.qtag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.qtag {
  background: var(--raised); border: 1px solid var(--border);
  border-radius: 20px; color: var(--muted); cursor: pointer;
  font-size: 11px; font-weight: 500; padding: 4px 11px;
  transition: all .15s; white-space: nowrap; user-select: none;
}
.qtag:hover  { border-color: var(--blue); color: var(--txt); background: rgba(59,130,246,.08); }
.qtag:active { transform: scale(.94); }

.btn-add {
  align-self: flex-end; background: var(--blue); border: none;
  border-radius: 7px; color: #fff; cursor: pointer;
  font-family: var(--sans); font-size: 13px; font-weight: 600;
  padding: 9px 22px; transition: opacity .15s, transform .1s; white-space: nowrap;
}
.btn-add:hover  { opacity: .85; }
.btn-add:active { transform: scale(.97); }

/* ─── JOURNAL ─────────────────────────────────────────────────────────── */
.day-block { margin-bottom: 16px; }
.day-hdr {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 14px; background: var(--raised);
  border: 1px solid var(--border); border-bottom: none;
  border-radius: var(--r) var(--r) 0 0;
}
.day-name { font-family: var(--mono); font-size: 12px; font-weight: 600; color: var(--muted); }
.day-badge {
  font-family: var(--mono); font-size: 12px; font-weight: 700;
  padding: 4px 11px; border-radius: 6px;
}
.day-badge.g { background: var(--green-lo); color: var(--green); border: 1px solid rgba(0,217,126,.2); }
.day-badge.r { background: var(--red-lo);   color: var(--red);   border: 1px solid rgba(255,69,96,.2); }

/* trade list wrapper */
.trade-list {
  background: var(--card); border: 1px solid var(--border);
  border-top: none; border-radius: 0 0 var(--r) var(--r); overflow: hidden;
}

/* desktop column header */
.trade-thead {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr 1.5fr 36px;
  padding: 7px 14px;
  background: rgba(255,255,255,.015);
  border-bottom: 1px solid var(--border);
  gap: 8px;
}
.trade-thead span {
  font-size: 10px; font-weight: 600; letter-spacing: .08em;
  text-transform: uppercase; color: var(--muted);
}
.trade-thead span:not(:first-child) { text-align: right; }

/* trade row */
.ti {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr 1.5fr 36px;
  gap: 8px; align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  transition: background .12s;
}
.ti:last-child { border-bottom: none; }
.ti:hover { background: rgba(255,255,255,.02); }
.ti.win  { box-shadow: inset 3px 0 0 var(--green); }
.ti.loss { box-shadow: inset 3px 0 0 var(--red); }

/* cells */
.ti-tk { font-family: var(--mono); font-size: 13px; font-weight: 700; color: #fff; }
.note-pill {
  display: block; margin-top: 3px;
  font-family: var(--sans); font-size: 10px; font-weight: 500;
  color: var(--muted); background: var(--raised);
  border: 1px solid var(--border); border-radius: 4px;
  padding: 1px 6px; max-width: 170px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.ti-n  { font-family: var(--mono); font-size: 12px; color: var(--muted); text-align: right; }
.ti-pl {
  font-family: var(--mono); font-size: 13px; font-weight: 700; text-align: right;
}
.ti-pl .pct { display: block; font-size: 10px; font-weight: 500; color: var(--muted); margin-top: 1px; }
.ti-ac { text-align: right; }
.ti-meta { display: none; } /* mobile-only */

/* colors */
.cg { color: var(--green); }
.cr { color: var(--red); }
.cm { color: var(--muted); }

/* del button */
.del-btn {
  background: none; border: 1px solid transparent; border-radius: 5px;
  color: var(--dim); cursor: pointer; font-size: 12px;
  padding: 4px 7px; transition: all .15s;
  min-width: 28px; min-height: 28px;
}
.del-btn:hover { border-color: var(--red); color: var(--red); background: var(--red-lo); }

/* empty */
.empty { text-align: center; padding: 54px 20px; color: var(--muted); }
.empty-icon { font-size: 28px; margin-bottom: 8px; opacity: .45; }
.empty p { font-size: 13px; }

/* ─── MOBILE ──────────────────────────────────────────────────────────── */
@media (max-width: 640px) {
  body { font-size: 13px; }

  /* header */
  .hdr-date { display: none; } /* save space on small screens */

  /* balance: stack rows */
  .b-grid { grid-template-columns: 1fr; gap: 0; }
  .b-col {
    padding: 13px 0;
    border-bottom: 1px solid var(--border);
  }
  .b-col:first-child { padding-top: 0; }
  .b-col:last-child  { border-bottom: none; padding-bottom: 0; }
  .b-val { font-size: 19px; }

  /* stats: 2×2 */
  .stats { grid-template-columns: repeat(2,1fr); gap: 8px; }

  /* form: 2-col grid */
  .f-date { flex: 1 1 calc(50% - 5px); }
  .f-tick { flex: 1 1 calc(50% - 5px); }
  .f-num  { flex: 1 1 calc(33% - 7px); }
  .f-note { flex: 1 1 100%; }
  .btn-add { flex: 1 1 100%; padding: 13px; font-size: 15px; margin-top: 0; }

  /* prevent iOS auto-zoom on focus */
  .fg input, .fg textarea, .cap-edit input { font-size: 16px !important; }

  /* trade rows: card layout */
  .trade-thead { display: none; }

  .ti {
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto;
    grid-template-areas:
      "ticker pnl"
      "meta   actions";
    padding: 11px 14px;
    gap: 2px 10px;
    align-items: start;
  }
  .ti-tk  { grid-area: ticker; }
  .ti-pl  { grid-area: pnl; text-align: right; }
  .ti-ac  { grid-area: actions; align-self: end; }
  .ti-meta {
    grid-area: meta; display: block;
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    margin-top: 2px; line-height: 1.5;
  }
  .ti-n { display: none; }        /* hide individual number cols */
  .note-pill { display: none; }   /* shown in meta instead */
  .ti-pl .pct { display: inline; margin-left: 6px; }
}

@media (max-width: 380px) {
  .b-val { font-size: 17px; }
  .balance-card { padding: 16px 16px 14px; }
}
</style>
</head>
<body>
<div class="wrap">

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="dot"></div>
    <h1>Trade Journal</h1>
  </div>
  <div class="hdr-date" id="hdr-date"></div>
</div>

<!-- Balance Card -->
<div class="balance-card" id="balance-card">
  <div class="b-grid">

    <div class="b-col">
      <div class="b-lbl">Capital <button class="edit-btn" onclick="toggleCapEdit()">Edit</button></div>
      <div class="b-val" id="b-cap">—</div>
      <div class="b-hint" id="b-cap-hint">tap Edit to set</div>
      <div class="cap-edit" id="cap-edit">
        <input type="number" id="cap-inp" placeholder="10000" step="100"
               onkeydown="if(event.key==='Enter')saveCapital()">
        <button onclick="saveCapital()">Save</button>
      </div>
    </div>

    <div class="b-col">
      <div class="b-lbl">Total P&amp;L</div>
      <div class="b-val" id="b-pnl">$ 0.00</div>
      <div class="b-hint" id="b-pnl-hint">0 closed trades</div>
    </div>

    <div class="b-col">
      <div class="b-lbl">Portfolio Value</div>
      <div class="b-val" id="b-port">—<span class="badge n" id="b-pct" style="font-size:10px;margin-left:6px">—</span></div>
      <div class="b-hint">capital + P&amp;L</div>
    </div>

  </div>
  <div class="pbar-wrap"><div class="pbar-fill" id="pbar"></div></div>
</div>

<!-- Stats -->
<div class="stats">
  <div class="stat"><div class="s-lbl">Today's P&amp;L</div><div class="s-val" id="s-today">$ 0.00</div></div>
  <div class="stat"><div class="s-lbl">Win Rate</div><div class="s-val" id="s-wr">—</div></div>
  <div class="stat"><div class="s-lbl">Total Trades</div><div class="s-val" id="s-count">0</div></div>
  <div class="stat"><div class="s-lbl">Avg P&amp;L / Trade</div><div class="s-val" id="s-avg">—</div></div>
</div>

<!-- Form -->
<div class="form-card">
  <div class="form-title">+ New Trade</div>
  <div class="form-row">
    <div class="fg f-date"><label>Date</label><input type="date" id="f-date"></div>
    <div class="fg f-tick"><label>Ticker</label><input type="text" id="f-ticker" placeholder="MSAI" maxlength="30"></div>
    <div class="fg f-num"><label>Shares</label><input type="number" id="f-size" placeholder="1000" min="1"></div>
    <div class="fg f-num"><label>Entry $</label><input type="number" id="f-entry" placeholder="1.85" step="0.0001"></div>
    <div class="fg f-num"><label>Exit $</label><input type="number" id="f-exit" placeholder="2.35" step="0.0001"></div>
    <div class="fg f-note">
      <label>Notes</label>
      <textarea id="f-note" placeholder="e.g. Cut Loss, No Volume..."></textarea>
    </div>
    <button class="btn-add" onclick="addTrade()">Add Trade</button>
  </div>
  <div class="qtag-row">
    <button class="qtag" onclick="appendTag('Cut Loss')">✂️ Cut Loss</button>
    <button class="qtag" onclick="appendTag('No Volume')">📉 No Volume</button>
    <button class="qtag" onclick="appendTag('Stop Hit')">🛑 Stop Hit</button>
    <button class="qtag" onclick="appendTag('Profit Target')">🎯 Profit Target</button>
    <button class="qtag" onclick="appendTag('FOMO')">😰 FOMO</button>
    <button class="qtag" onclick="appendTag('News Play')">📰 News Play</button>
    <button class="qtag" onclick="appendTag('Oversize')">⚠️ Oversize</button>
    <button class="qtag" onclick="appendTag('Scalp')">⚡ Scalp</button>
  </div>
</div>

<!-- Journal -->
<div id="journal"></div>

</div><!-- /wrap -->
<script>
// ── State ─────────────────────────────────────────────────────────────────
let trades  = JSON.parse(localStorage.getItem('tj2_trades')  || '[]');
let capital = parseFloat(localStorage.getItem('tj2_capital') || '0');

function persist() {
  localStorage.setItem('tj2_trades',  JSON.stringify(trades));
  localStorage.setItem('tj2_capital', capital.toString());
}

// ── Helpers ───────────────────────────────────────────────────────────────
const usd = (n, plus=false) => {
  const sign = n < 0 ? '-' : (plus && n > 0 ? '+' : '');
  return sign + '$ ' + Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
};
const todayISO  = () => new Date().toISOString().slice(0,10);
const fmtDate   = iso => { const [y,m,d]=iso.split('-'); return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]+' '+d+', '+y; };
const fmtDow    = iso => ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(iso+'T12:00:00').getDay()];
const esc       = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── Capital ────────────────────────────────────────────────────────────────
function toggleCapEdit() {
  const b = document.getElementById('cap-edit');
  b.classList.toggle('open');
  if (b.classList.contains('open')) {
    const i = document.getElementById('cap-inp');
    i.value = capital || ''; i.focus(); i.select();
  }
}
function saveCapital() {
  const v = parseFloat(document.getElementById('cap-inp').value);
  if (!isNaN(v) && v >= 0) { capital = v; persist(); render(); }
  document.getElementById('cap-edit').classList.remove('open');
}

// ── Quick Tags ─────────────────────────────────────────────────────────────
function appendTag(tag) {
  const el = document.getElementById('f-note');
  const cur = el.value.trim();
  el.value = cur ? cur + ', ' + tag : tag;
  el.focus();
}

// ── Add / Delete ──────────────────────────────────────────────────────────
function addTrade() {
  const date   = document.getElementById('f-date').value;
  const ticker = document.getElementById('f-ticker').value.trim().toUpperCase();
  const size   = parseFloat(document.getElementById('f-size').value);
  const entry  = parseFloat(document.getElementById('f-entry').value);
  const exitV  = parseFloat(document.getElementById('f-exit').value);
  const note   = document.getElementById('f-note').value.trim();

  if (!date || !ticker || !size || !entry) {
    const fc = document.querySelector('.form-card');
    fc.style.outline = '1.5px solid var(--red)';
    setTimeout(()=>fc.style.outline='', 1400); return;
  }

  const pnl = isNaN(exitV) ? null : parseFloat(((exitV-entry)*size).toFixed(4));
  trades.push({ id:Date.now(), date, ticker, size, entry, exit:isNaN(exitV)?null:exitV, pnl, note });
  persist(); render();

  ['f-ticker','f-size','f-entry','f-exit','f-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-ticker').focus();
}

function deleteTrade(id) {
  if (!confirm('Remove this trade?')) return;
  trades = trades.filter(t=>t.id!==id); persist(); render();
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() { updateHeader(); updateBalance(); updateStats(); renderJournal(); }

function updateHeader() {
  const n=new Date();
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('hdr-date').textContent=`${days[n.getDay()]}, ${mo[n.getMonth()]} ${n.getDate()}, ${n.getFullYear()}`;
}

function updateBalance() {
  const cl   = trades.filter(t=>t.pnl!==null);
  const pnl  = cl.reduce((s,t)=>s+t.pnl,0);
  const port = capital+pnl;
  const pct  = capital>0 ? pnl/capital*100 : null;
  const card = document.getElementById('balance-card');
  card.className = 'balance-card ' + (pnl>0?'g':pnl<0?'r':'');

  const bCap = document.getElementById('b-cap');
  bCap.textContent = capital>0 ? usd(capital) : '—';
  bCap.className = 'b-val';
  document.getElementById('b-cap-hint').textContent = capital>0 ? 'starting capital' : 'tap Edit to set';

  const bPnl = document.getElementById('b-pnl');
  bPnl.textContent = usd(pnl,true);
  bPnl.className = 'b-val '+(pnl>0?'g':pnl<0?'r':'');
  document.getElementById('b-pnl-hint').textContent = `${cl.length} closed trade${cl.length!==1?'s':''}`;

  const bPort = document.getElementById('b-port');
  const bPctEl= document.getElementById('b-pct');
  bPort.firstChild.textContent = (capital>0 ? usd(port) : usd(pnl)) + ' ';
  bPort.className = 'b-val '+(pnl>0?'g':pnl<0?'r':'');
  if (pct!==null) {
    bPctEl.textContent = (pct>=0?'+':'')+pct.toFixed(2)+'%';
    bPctEl.className = 'badge '+(pct>0?'g':pct<0?'r':'n');
  } else { bPctEl.textContent='—'; bPctEl.className='badge n'; }

  const bar=document.getElementById('pbar');
  if (capital>0 && pnl!==0) {
    bar.style.width=Math.min(Math.abs(pnl)/capital*100,100)+'%';
    bar.className='pbar-fill '+(pnl>=0?'g':'r');
  } else { bar.style.width='0%'; bar.className='pbar-fill'; }
}

function updateStats() {
  const cl  = trades.filter(t=>t.pnl!==null);
  const tot = cl.reduce((s,t)=>s+t.pnl,0);
  const td  = cl.filter(t=>t.date===todayISO()).reduce((s,t)=>s+t.pnl,0);
  const wins= cl.filter(t=>t.pnl>0).length;
  const wr  = cl.length ? Math.round(wins/cl.length*100) : null;
  const avg = cl.length ? tot/cl.length : null;

  const setS=(id,txt,n)=>{ const e=document.getElementById(id); e.textContent=txt; e.className='s-val'+(n>0?' g':n<0?' r':''); };
  setS('s-today', usd(td,true), td);
  const wrEl=document.getElementById('s-wr');
  wrEl.textContent=wr!==null?wr+'%':'—';
  wrEl.className='s-val'+(wr>50?' g':wr!==null&&wr<50?' r':'');
  document.getElementById('s-count').textContent=trades.length;
  document.getElementById('s-count').className='s-val';
  if (avg!==null) setS('s-avg',usd(avg,true),avg);
  else { document.getElementById('s-avg').textContent='—'; document.getElementById('s-avg').className='s-val'; }
}

function renderJournal() {
  const el=document.getElementById('journal');
  if (!trades.length) {
    el.innerHTML=`<div class="empty"><div class="empty-icon">📈</div><p>No trades yet — add your first one above.</p></div>`;
    return;
  }
  const byDate={};
  [...trades].sort((a,b)=>b.date.localeCompare(a.date)).forEach(t=>{ (byDate[t.date]=byDate[t.date]||[]).push(t); });

  let html='';
  Object.entries(byDate).forEach(([date,rows])=>{
    const dp  = rows.reduce((s,t)=>s+(t.pnl??0),0);
    const cls = dp>=0?'g':'r';
    html+=`
<div class="day-block">
  <div class="day-hdr">
    <span class="day-name">${fmtDow(date)} · ${fmtDate(date)}</span>
    <span class="day-badge ${cls}">${usd(dp,true)}</span>
  </div>
  <div class="trade-list">
    <div class="trade-thead">
      <span>Ticker</span><span>Shares</span><span>Entry</span><span>Exit</span><span>P&amp;L</span><span></span>
    </div>
    ${rows.map(t=>{
      const rc  = t.pnl===null?'': t.pnl>=0?'win':'loss';
      const pc  = t.pnl===null?'cm': t.pnl>=0?'cg':'cr';
      const pctV= (t.pnl!==null&&t.exit!==null&&t.entry>0)
        ? ((t.exit-t.entry)/t.entry*100).toFixed(1)+'%' : '';
      const noteTxt = t.note||'';
      // mobile meta line
      const metaParts=[`${t.size.toLocaleString()} shares`];
      if(t.entry) metaParts.push(`$${t.entry.toFixed(2)} → ${t.exit!==null?'$'+t.exit.toFixed(2):'open'}`);
      if(noteTxt) metaParts.push(noteTxt);

      return `<div class="ti ${rc}">
  <div class="ti-tk">${esc(t.ticker)}${noteTxt?`<span class="note-pill">${esc(noteTxt)}</span>`:''}</div>
  <div class="ti-n">${t.size.toLocaleString()}</div>
  <div class="ti-n">$ ${t.entry.toFixed(2)}</div>
  <div class="ti-n">${t.exit!==null?'$ '+t.exit.toFixed(2):'<span class="cm">—</span>'}</div>
  <div class="ti-pl ${pc}">
    ${t.pnl!==null?usd(t.pnl,true):'<span class="cm">open</span>'}
    ${pctV?`<span class="pct">${(t.pnl>=0?'+':'')}${pctV}</span>`:''}
  </div>
  <div class="ti-meta">${esc(metaParts.join(' · '))}</div>
  <div class="ti-ac"><button class="del-btn" onclick="deleteTrade(${t.id})">✕</button></div>
</div>`;
    }).join('')}
  </div>
</div>`;
  });
  el.innerHTML=html;
}

// ── Init ───────────────────────────────────────────────────────────────────
document.getElementById('f-date').value = todayISO();
['f-ticker','f-size','f-entry','f-exit'].forEach(id=>{
  document.getElementById(id).addEventListener('keydown',e=>{ if(e.key==='Enter') addTrade(); });
});
document.getElementById('f-ticker').addEventListener('input',function(){
  const s=this.selectionStart,e=this.selectionEnd;
  this.value=this.value.toUpperCase(); this.setSelectionRange(s,e);
});
render();
</script>
</body>
</html>
